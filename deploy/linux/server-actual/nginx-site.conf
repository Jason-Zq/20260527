# /etc/nginx/conf.d/<你的站点>.conf
# 替换你服务器上的 nginx 站点配置(用 8765 端口、对应实际路径 /opt/fastapi/)
#
# 部署:
#   scp deploy/linux/server-actual/nginx-site.conf \
#       root@8.138.111.12:/etc/nginx/conf.d/doc-review.conf
#   ssh root@8.138.111.12 'nginx -t && systemctl reload nginx'
#
# 注意:依赖同目录下的 zz-doc-review-limits.conf(定义 upload_limit / conn_limit zone)

server {
    listen 80 default_server;
    server_name _;

    # 业务批次上传 50 文件 × 50MB,留余量
    client_max_body_size 3g;

    # 大文件上传时不要让 nginx 把整个 body 缓冲到磁盘
    proxy_request_buffering off;
    proxy_buffering off;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;

    # ===== 前端静态文件 =====
    # 你的前端 dist 在 /opt/fastapi/frontend/dist;如不在改这里
    root /opt/fastapi/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ===== 业务批次接口 - 严限流(防业务方循环打爆) =====
    # 这块必须放在通用 /api/ 上面,优先匹配
    location ~ ^/api/archive-detect/business/batch {
        # 单 IP 同时最多 3 个连接(后端 UPLOAD_CONCURRENCY=1 兜底)
        limit_conn conn_limit 3;
        # 单 IP 2 r/s,突发 10 个,超出立即 503(nodelay 不排队,避免连接堆积)
        limit_req zone=upload_limit burst=10 nodelay;
        # 触发限流时返回 503,业务方应当退避重试
        limit_req_status 503;
        limit_conn_status 503;

        proxy_pass http://127.0.0.1:8765;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ===== 其它 API 通用反代(无限流) =====
    location /api/ {
        proxy_pass http://127.0.0.1:8765;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ===== OCR 渲染/拆分输出 =====
    location /uploads/ {
        alias /opt/fastapi/output/;
        expires 1d;
        add_header Cache-Control "public, immutable";
    }

    # ===== 健康检查(查 DB + worker) =====
    location = /healthz {
        proxy_pass http://127.0.0.1:8765/api/healthz;
        proxy_read_timeout 5s;
        access_log off;
    }
}
