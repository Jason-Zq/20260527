# /etc/nginx/conf.d/zz-doc-review-limits.conf
# 限流 zone 定义。文件名 zz- 前缀确保在 doc-review.conf 之前加载(其实顺序无关,nginx 会先扫完所有 zone)。
#
# 这两个 zone 必须定义在 http {} 上下文。conf.d/*.conf 由主 nginx.conf 的
# `http { ... include /etc/nginx/conf.d/*.conf; ... }` 包含,所以独立放一个文件也算 http 上下文。
#
# zone 设计:
# - upload_limit:  按 client IP 限速,2 r/s 平均速率,业务方提交批次很慢的速度
# - conn_limit:    按 client IP 同时连接数,3 个,防止一个 IP 同时建很多上传连接
#
# 业务方异常打爆的场景:10 个 IP 同时打 → 各自 3 并发 + 2r/s,总并发被压成 30,
# 加上后端 UPLOAD_CONCURRENCY=3 兜底,服务器写盘不会过载。

limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=2r/s;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;
