# /etc/nginx/conf.d/doc-review.conf
# 单站点:前端静态文件 + /api 反代 + /uploads 直接 serve
# HTTPS 配置看文末注释

server {
    listen 80 default_server;
    server_name _;

    # 上传文件上限(与 backend file_fetcher.MAX_DOWNLOAD_BYTES 一致)
    # 业务方批次上传 50 文件 × 50MB,留余量
    client_max_body_size 3g;

    # 大文件上传时不要让 nginx 把整个 body 缓冲到磁盘
    proxy_request_buffering off;
    proxy_buffering off;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;

    # ===== 前端静态文件 =====
    root /opt/doc-review/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ===== API 反代 =====
    # 业务批次提交/上传走更严的限流(防业务方循环打爆)
    location ~ ^/api/archive-detect/business/batch {
        # 单 IP 同时最多 3 个连接(配合后端 UPLOAD_CONCURRENCY=3)
        limit_conn conn_limit 3;
        # 单 IP 平均 2 r/s,允许突发 10 个,超出立即 503(不排队,避免连接堆积)
        limit_req zone=upload_limit burst=10 nodelay;
        # 触发限流时返回 503,业务方应当退避重试
        limit_req_status 503;
        limit_conn_status 503;

        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ===== OCR 渲染/拆分输出 =====
    # backend mount 在 /uploads → output/,但走 nginx 直发更快
    location /uploads/ {
        alias /opt/doc-review/output/;
        expires 1d;
        add_header Cache-Control "public, immutable";
    }

    # 健康检查(查 DB + worker 状态;失败返回 503)
    location = /healthz {
        proxy_pass http://127.0.0.1:8000/api/healthz;
        proxy_read_timeout 5s;
        access_log off;
    }
}

